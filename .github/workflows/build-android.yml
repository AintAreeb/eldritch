name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          [ -f manifest.json ] && cp manifest.json www/ || true
          [ -f sw.js ] && cp sw.js www/ || true
          [ -f icon.png ] && cp icon.png www/ || true
      - run: npm install
      - run: npx cap add android
      - name: Build adaptive icon layers (foreground, background, monochrome)
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          mkdir -p resources
          convert -size 1024x1024 xc:"#000000" \
            \( icon.png -resize 620x620 \) -gravity center -composite \
            resources/icon.png
          convert -size 1024x1024 xc:none \
            \( icon.png -resize 620x620 \) -gravity center -composite \
            resources/icon-foreground.png
          convert -size 1024x1024 xc:"#000000" \
            resources/icon-background.png
          convert -size 1024x1024 xc:none \
            \( icon.png -resize 620x620 -fill white -colorize 100% \) -gravity center -composite \
            resources/icon-monochrome.png
          convert -size 2732x2732 xc:"#000000" \
            \( icon.png -resize 1200x1200 \) -gravity center -composite \
            resources/splash.png
      - name: Generate icon and splash screen
        run: |
          npx @capacitor/assets generate --android \
            --splashBackgroundColor '#000000' \
            --splashBackgroundColorDark '#000000'
      - run: npx cap sync android
      - run: chmod +x android/gradlew
      - working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk grimoire.apk
          echo "APK_NAME=grimoire.apk" >> $GITHUB_ENV
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Build ${{ github.sha }}"
          body: "Commit: ${{ github.sha }}"
          files: ${{ env.APK_NAME }}